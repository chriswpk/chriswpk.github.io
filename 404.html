<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>404 — Aquamarine</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #0b1120;
        color: #e6edf6;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-size: clamp(3rem, 12vw, 6rem);
        margin: 0;
        background: linear-gradient(120deg, #38e0c9, #4aa8ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p {
        color: #9fb0c7;
        margin: 0;
        max-width: 32ch;
      }
      a {
        margin-top: 1rem;
        display: inline-block;
        padding: 0.75rem 1.5rem;
        border-radius: 10px;
        font-weight: 600;
        text-decoration: none;
        color: #04121a;
        background: linear-gradient(135deg, #38e0c9, #4aa8ff);
      }
    </style>
  </head>
  <body>
    <h1>404</h1>
    <p>This page drifted off the map. Let's get you back to shore.</p>
    <a href="/">Return home</a>
  </body>
</html>
